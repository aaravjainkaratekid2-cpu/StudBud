// ─── BACKUP / RESTORE ────────────────────────────────────────────────────────
function exportBackup() {
  const keys = ["studyos_courses","studyos_tasks","studyos_decks","studyos_data"];
  const backup = {};
  keys.forEach(k => { try { backup[k] = JSON.parse(localStorage.getItem(k) || "null"); } catch (e2) {} });
  backup._exported = new Date().toISOString();
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "studyos-backup.json"; a.click();
  URL.revokeObjectURL(url);
}

function importBackup(file, onDone) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const backup = JSON.parse(e.target.result);
      const keys = ["studyos_courses","studyos_tasks","studyos_decks","studyos_data"];
      keys.forEach(k => { if (backup[k] !== null && backup[k] !== undefined) localStorage.setItem(k, JSON.stringify(backup[k])); });
      onDone(null);
    } catch (e3) { onDone("Invalid backup file."); }
  };
  reader.readAsText(file);
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function gradeToLetter(pct) {
  if (pct >= 97) return "A+";
  if (pct >= 93) return "A";
  if (pct >= 90) return "A-";
  if (pct >= 87) return "B+";
  if (pct >= 83) return "B";
  if (pct >= 80) return "B-";
  if (pct >= 77) return "C+";
  if (pct >= 73) return "C";
  if (pct >= 70) return "C-";
  if (pct >= 67) return "D+";
  if (pct >= 63) return "D";
  if (pct >= 60) return "D-";
  return "F";
}
function gradeToGPA(pct) {
  if (pct >= 93) return 4.0;
  if (pct >= 90) return 3.7;
  if (pct >= 87) return 3.3;
  if (pct >= 83) return 3.0;
  if (pct >= 80) return 2.7;
  if (pct >= 77) return 2.3;
  if (pct >= 73) return 2.0;
  if (pct >= 70) return 1.7;
  if (pct >= 67) return 1.3;
  if (pct >= 63) return 1.0;
  if (pct >= 60) return 0.7;
  return 0.0;
}
function formatTime(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
  return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
function formatMs(ms) {
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  const cs = Math.floor((ms % 1000) / 10);
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}.${String(cs).padStart(2,"0")}`;
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.ceil((d - now) / 86400000);
}

// ─── RESPONSIVE HOOK ──────────────────────────────────────────────────────────
function useWindowWidth() {
  const [w, setW] = useState(() => (typeof window !== "undefined" ? window.innerWidth : 400));
  useEffect(() => {
    const fn = () => setW(window.innerWidth);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return w;
}

function loadCourses() { try { return JSON.parse(localStorage.getItem("studyos_courses") || "[]"); } catch (e4) { return []; } }
function saveCourses(c, uid) { try { localStorage.setItem("studyos_courses", JSON.stringify(c)); } catch (e5) {} if (uid) cloudSave(uid, "studyos_courses", c); }

  const [activeCourse, setActiveCourse] = useState(() => { const c = loadCourses(); return c.length ? c[0].id : null; });
  const [newCourse, setNewCourse] = useState("");
  const [newName, setNewName] = useState("");
  const [newScore, setNewScore] = useState("");
  const [newMax, setNewMax] = useState("100");
  const [newWeight, setNewWeight] = useState("");
  const [colorPickerOpen, setColorPickerOpen] = useState(null); // course id
  const [dragOver, setDragOver] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [renamingCourse, setRenamingCourse] = useState(null);
  const [renameCourseval, setRenameCourseval] = useState(""); // course id
  const dragItem = useRef(null);

  const course = courses.find(c => c.id === activeCourse);

  const COLOR_PALETTE = [
    "#6C8EFF","#FF6B6B","#3EC98A","#FFB347","#A78BFA","#F472B6",
    "#38BDF8","#FB923C","#34D399","#F87171","#818CF8","#FBBF24",
    "#2DD4BF","#E879F9","#60A5FA","#F97316",
  ];

  function calcGrade(assignments) {
    const totalWeight = assignments.reduce((a, x) => a + Number(x.weight), 0);
    if (!assignments.length || totalWeight === 0) return null;
    const weighted = assignments.reduce((a, x) => a + (Number(x.score) / Number(x.max)) * 100 * Number(x.weight), 0);
    return weighted / totalWeight;
  }

  function updateCourses(fn) { setCourses(prev => { const next = fn(prev); saveCourses(next); showToast(); return next; }); }

  function addCourse() {
    if (!newCourse.trim()) return;
    const id = Date.now();
    updateCourses(c => [...c, { id, name: newCourse.trim(), color: SUBJECT_COLORS[c.length % SUBJECT_COLORS.length], assignments: [] }]);
    setActiveCourse(id);
    setNewCourse("");
  }

  function addAssignment() {
    if (!newName || newScore === "" || !newMax || !newWeight) return;
    updateCourses(cs => cs.map(c => c.id === activeCourse ? {
      ...c, assignments: [...c.assignments, { id: Date.now(), name: newName, score: Number(newScore), max: Number(newMax), weight: Number(newWeight) }]
    } : c));
    setNewName(""); setNewScore(""); setNewMax("100"); setNewWeight("");
  }

  const [editingAssignment, setEditingAssignment] = useState(null);
  const [editAssForm, setEditAssForm] = useState({ name: "", score: "", max: "100", weight: "" });

  function removeAssignment(aid) {
    updateCourses(cs => cs.map(c => c.id === activeCourse ? { ...c, assignments: c.assignments.filter(a => a.id !== aid) } : c));
  }
  function startEditAssignment(a) { setEditingAssignment(a.id); setEditAssForm({ name: a.name, score: String(a.score), max: String(a.max), weight: String(a.weight) }); }
  function saveEditAssignment() {
    updateCourses(cs => cs.map(c => c.id === activeCourse ? {
      ...c, assignments: c.assignments.map(a => a.id === editingAssignment ? { ...a, name: editAssForm.name, score: Number(editAssForm.score), max: Number(editAssForm.max), weight: Number(editAssForm.weight) } : a)
    } : c));
    setEditingAssignment(null);
  }

  function removeCourse(id) {
    updateCourses(cs => { const next = cs.filter(c => c.id !== id); if (activeCourse === id) setActiveCourse(next.length ? next[0].id : null); return next; });
  }

  function setCourseColor(id, color) {
    updateCourses(cs => cs.map(c => c.id === id ? { ...c, color } : c));
    setColorPickerOpen(null);
  }
  function saveCourseRename() {
    if (!renameCourseval.trim()) { setRenamingCourse(null); return; }
    updateCourses(cs => cs.map(c => c.id === renamingCourse ? { ...c, name: renameCourseval.trim() } : c));
    setRenamingCourse(null);
  }

  // Drag to reorder
  function onDragStart(e, id) { dragItem.current = id; e.dataTransfer.effectAllowed = "move"; }
  function onDragOver(e, id) { e.preventDefault(); setDragOver(id); }
  function onDrop(e, targetId) {
    e.preventDefault();
    setDragOver(null);
    if (dragItem.current === targetId) return;
    updateCourses(cs => {
      const from = cs.findIndex(c => c.id === dragItem.current);
      const to = cs.findIndex(c => c.id === targetId);
      const next = [...cs];
      const [moved] = next.splice(from, 1);
      next.splice(to, 0, moved);
      return next;
    });
    dragItem.current = null;
  }
  function onDragEnd() { setDragOver(null); dragItem.current = null; }

  const w = useWindowWidth();
  const isMobile = w < 500;

  const pct = course ? calcGrade(course.assignments) : null;
  const totalWeight = course ? course.assignments.reduce((a, x) => a + Number(x.weight), 0) : 0;

  return (
    React.createElement('div', { onClick: () => { colorPickerOpen && setColorPickerOpen(null); confirmDelete && setConfirmDelete(null); }}
      , React.createElement('h2', { style: { fontFamily: t.font, color: t.text, margin: "0 0 18px", fontSize: 22 }}, "Grade Calculator" )

      /* Course tabs */
      , React.createElement('div', { style: { display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16, alignItems: "center" }}
        , courses.map(c => {
          const g = calcGrade(c.assignments);
          const isActive = activeCourse === c.id;
          const isDragTarget = dragOver === c.id;
          return (
            React.createElement('div', { key: c.id, draggable: true,
              onDragStart: e => onDragStart(e, c.id),
              onDragOver: e => onDragOver(e, c.id),
              onDrop: e => onDrop(e, c.id),
              onDragEnd: onDragEnd,
              style: {

              , React.createElement('div', { style: {
                position: "absolute", left: -14, top: "50%", transform: "translateY(-50%)",
                color: t.textMuted, fontSize: 10, cursor: "grab", opacity: 0.5,
                display: isMobile ? "none" : "block",

                    autoFocus: true,

                    onBlur: saveCourseRename,
                    onKeyDown: e => { if (e.key === "Enter") saveCourseRename(); if (e.key === "Escape") setRenamingCourse(null); },
                    onClick: e => e.stopPropagation(),
                    style: { background: "transparent", border: "none", outline: "none", color: "inherit", fontFamily: "inherit", fontWeight: "inherit", fontSize: "inherit", width: 90 }
                  })
                : React.createElement('span', { onDoubleClick: e => { e.stopPropagation(); setRenamingCourse(c.id); setRenameCourseval(c.name); } }, c.name, " " , g !== null ? `· ${gradeToLetter(g)}` : "")
              )

  function addTask() {
    if (!form.title || !form.dueDate) return;
    updateTasks(ts => [...ts, { ...form, id: Date.now(), done: false }]);
    setForm({ title: "", type: "homework", subject: "", color: SUBJECT_COLORS[0], dueDate: "", startDate: "", priority: "medium" });
    setShowAdd(false);
  }

  const [editingTask, setEditingTask] = useState(null); // task id
  const [editForm, setEditForm] = useState({});

  function toggleDone(id) { updateTasks(ts => ts.map(tk => tk.id === id ? { ...tk, done: !tk.done } : tk)); }
  function removeTask(id) { updateTasks(ts => ts.filter(tk => tk.id !== id)); }
  function startEdit(task) { setEditingTask(task.id); setEditForm({ ...task }); }
  function saveEdit() {
    updateTasks(ts => ts.map(tk => tk.id === editingTask ? { ...editForm, id: tk.id, done: tk.done } : tk));
    setEditingTask(null);
  }

  const filtered = tasks.filter(t => {
    if (filter === "all") return true;
    if (filter === "pending") return !t.done;
    if (filter === "done") return t.done;
    if (filter === "test") return t.type === "test";
    if (filter === "homework") return t.type === "homework";
    return true;

    if (a.done !== b.done) return a.done ? 1 : -1;
    return new Date(a.dueDate) - new Date(b.dueDate);
